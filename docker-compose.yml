version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sem_api
      POSTGRES_USER:     sem_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sem_user -d sem_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sem_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql://sem_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/sem_api
      ALLOWED_ORIGINS:      ${ALLOWED_ORIGINS:-*}
      ADMIN_API_KEY:        ${ADMIN_API_KEY:-changeme_admin}
      RATE_LIMIT_ENABLED:   ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_RENDER_RPM: ${RATE_LIMIT_RENDER_RPM:-20}
      RENDER_TIMEOUT_SEC:   ${RENDER_TIMEOUT_SEC:-25}
      MAX_CONCURRENT_RENDERS: ${MAX_CONCURRENT_RENDERS:-5}
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      LOG_FORMAT:           ${LOG_FORMAT:-text}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
